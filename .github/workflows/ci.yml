name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black pip-audit pytest
          
      - name: Lint with Ruff
        run: ruff check . || echo "Ruff found issues but allowing pipeline to proceed during initial adoption"
        
      - name: Format Check with Black
        run: black --check . || echo "Black found issues but allowing pipeline to proceed during initial adoption"
        
      - name: Run Tests
        env:
          DATABASE_URL: sqlite:///./test.db
        run: pytest 
        
      - name: Security Audit (pip-audit)
        run: pip-audit || echo "Audit found vulnerabilities but allowing pipeline to proceed for now"
        
      - name: Docker Build Check
        working-directory: .
        run: docker build -t spasht-backend:test -f backend/Dockerfile .

      
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Lint with ESLint
        run: npm run lint || echo "ESLint found issues but allowing pipeline to proceed during initial adoption"
        
      - name: Build Check
        run: npm run build

  secrets-scanner:
    name: Secrets Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
